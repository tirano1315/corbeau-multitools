<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐦 Corbeau-MultiTools V4</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#090912;
color:#fff;
font-family:Arial,sans-serif;
padding:20px;
}

h1{
text-align:center;
font-size:3rem;
color:#b084ff;
text-shadow:0 0 20px #8b5cf6;
margin-bottom:30px;
}

#search{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-bottom:25px;
font-size:18px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#161628;
border:1px solid #7f5af0;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 0 15px rgba(127,90,240,.3);
}

h2{
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:12px;
border:none;
border-radius:12px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#7f5af0;
color:white;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:10px;
word-break:break-word;
}
</style>
</head>

<body>

<h1>🐦 Corbeau-MultiTools V4</h1>

<input id="search" placeholder="Rechercher un outil...">

<div class="container">

<div class="card tool">
<h2>🔐 Générateur de mot de passe</h2>
<button onclick="generatePassword()">Générer</button>
<div id="passwordResult" class="result"></div>
</div>

<div class="card tool">
<h2>🔤 Encodeur Base64</h2>
<input id="b64input" placeholder="Texte">
<button onclick="encode64()">Encoder</button>
<div id="b64result" class="result"></div>
</div>

<div class="card tool">
<h2>🔓 Décodeur Base64</h2>
<input id="b64decode" placeholder="Base64">
<button onclick="decode64()">Décoder</button>
<div id="b64decodeResult" class="result"></div>
</div>

<div class="card tool">
<h2>🆔 UUID Generator</h2>
<button onclick="uuidGen()">Générer</button>
<div id="uuidResult" class="result"></div>
</div>

<div class="card tool">
<h2>🔳 QR Code</h2>
<input id="qrText" placeholder="Texte ou URL">
<button onclick="qrGen()">Créer QR</button>
<div id="qrResult"></div>
</div>

<div class="card tool">
<h2>🌐 IP Lookup (API)</h2>
<input id="ipInput" placeholder="IP ou vide pour la vôtre">
<button onclick="ipLookup()">Rechercher</button>
<div id="ipResult" class="result"></div>
</div>

<div class="card tool">
<h2>📝 Formateur JSON</h2>
<textarea id="jsonInput"></textarea>
<button onclick="formatJSON()">Formater</button>
<div id="jsonResult" class="result"></div>
</div>

</div>

<script>

document.getElementById("search").addEventListener("input",function(){
let value=this.value.toLowerCase();
document.querySelectorAll(".tool").forEach(card=>{
card.style.display=
card.innerText.toLowerCase().includes(value)
? "block" : "none";
});
});

function generatePassword(){
let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%";
let pass="";
for(let i=0;i<16;i++){
pass+=chars[Math.floor(Math.random()*chars.length)];
}
passwordResult.innerText=pass;
}

function encode64(){
b64result.innerText=btoa(b64input.value);
}

function decode64(){
try{
b64decodeResult.innerText=atob(b64decode.value);
}catch{
b64decodeResult.innerText="Base64 invalide";
}
}

function uuidGen(){
uuidResult.innerText=crypto.randomUUID();
}

function qrGen(){
let text=encodeURIComponent(qrText.value);
qrResult.innerHTML=
`<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${text}">`;
}

async function ipLookup(){
let ip=ipInput.value.trim();
let url=ip
? `https://ip-api.com/json/${ip}`
: `https://ip-api.com/json/`;

let r=await fetch(url);
let d=await r.json();

ipResult.innerHTML=
`
Pays : ${d.country || "?"}<br>
Ville : ${d.city || "?"}<br>
FAI : ${d.isp || "?"}<br>
IP : ${d.query || "?"}
`;
}

function formatJSON(){
try{
let obj=JSON.parse(jsonInput.value);
jsonResult.innerHTML=
`<pre>${JSON.stringify(obj,null,2)}</pre>`;
}catch{
jsonResult.innerText="JSON invalide";
}
}

</script>

</body>
</html>
