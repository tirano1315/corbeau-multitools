<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐦 Corbeau Hub V7</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
padding:20px;
}

.hero{
text-align:center;
padding:40px 20px;
margin-bottom:20px;
background:rgba(255,255,255,.05);
border-radius:25px;
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.1);
}

.hero h1{
font-size:2.2rem;
margin-bottom:10px;
}

.hero p{
opacity:.8;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin:20px 0;
font-size:16px;
background:#161d35;
color:white;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:20px;
}

.stat{
background:#161d35;
padding:15px;
text-align:center;
border-radius:15px;
}

.category{
margin-top:30px;
margin-bottom:10px;
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:12px;
}

.tool{
background:#161d35;
padding:18px;
border-radius:18px;
cursor:pointer;
transition:.3s;
text-align:center;
}

.tool:hover{
transform:translateY(-4px);
}

button{
margin-top:10px;
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#7c3aed;
color:white;
}

.result{
margin-top:10px;
font-size:14px;
word-break:break-all;
}
</style>
</head>

<body>

<div class="hero">
<h1>🐦 Corbeau Hub V7</h1>
<p>50+ outils gratuits • Mobile • Rapide</p>
</div>

<input
class="search"
id="search"
placeholder="🔍 Rechercher un outil..."
onkeyup="searchTools()">

<div class="stats">
<div class="stat">🧰 50+</div>
<div class="stat">⭐ Favoris</div>
<div class="stat">⚡ V7</div>
</div>

<div class="category">🔐 Sécurité</div>

<div class="grid">

<div class="tool card">
<h3>🔑 Password</h3>
<button onclick="generatePassword()">Générer</button>
<div id="password" class="result"></div>
</div>

<div class="tool card">
<h3>🆔 UUID</h3>
<button onclick="generateUUID()">Créer</button>
<div id="uuid" class="result"></div>
</div>

<div class="tool card">
<h3>🎲 Random</h3>
<button onclick="randomNumber()">Générer</button>
<div id="random" class="result"></div>
</div>

</div>

<div class="category">💻 Développement</div>

<div class="grid">

<div class="tool card">
<h3>🔤 Base64</h3>
<input id="baseInput" placeholder="Texte">
<button onclick="encodeBase64()">Encoder</button>
<div id="baseOutput" class="result"></div>
</div>

<div class="tool card">
<h3>📝 JSON</h3>
<p>Formatter bientôt</p>
</div>

<div class="tool card">
<h3>🌐 URL Encode</h3>
<p>Bientôt</p>
</div>

</div>

<script>

function generatePassword(){
const chars=
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

let pass="";

for(let i=0;i<16;i++){
pass+=chars.charAt(
Math.floor(Math.random()*chars.length)
);
}

document.getElementById("password").innerText=pass;
}

function generateUUID(){
document.getElementById("uuid").innerText=
crypto.randomUUID();
}

function randomNumber(){
document.getElementById("random").innerText=
Math.floor(Math.random()*1000000);
}

function encodeBase64(){
const text=
document.getElementById("baseInput").value;

document.getElementById("baseOutput").innerText=
btoa(text);
}

function searchTools(){
let value=
document.getElementById("search")
.value
.toLowerCase();

document.querySelectorAll(".card")
.forEach(card=>{

card.style.display=
card.innerText.toLowerCase().includes(value)
? "block"
: "none";

});
}

</script>

</body>
</html>
