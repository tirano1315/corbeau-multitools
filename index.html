<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🐦 Corbeau Hub V8</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#070d1f;
color:white;
padding:20px;
}

.logo{
text-align:center;
font-size:38px;
font-weight:bold;
margin:20px 0;
color:#9b5cff;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:#131c3d;
color:white;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
background:#131c3d;
padding:18px;
border-radius:20px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
font-size:18px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#8b5cf6;
color:white;
margin-top:10px;
}

.result{
margin-top:10px;
word-break:break-all;
font-size:13px;
}

.category{
font-size:28px;
font-weight:bold;
margin:30px 0 15px;
}
</style>
</head>

<body>

<div class="logo">🐦 Corbeau Hub</div>

<input
class="search"
placeholder="🔍 Rechercher un outil..."
onkeyup="searchTools()"
id="search">

<div class="category">🧰 MultiTools</div>

<div class="grid">

<div class="card">
<h3>🔑 Password</h3>
<button onclick="generatePassword()">Créer</button>
<div id="password" class="result"></div>
</div>

<div class="card">
<h3>🆔 UUID</h3>
<button onclick="generateUUID()">Créer</button>
<div id="uuid" class="result"></div>
</div>

<div class="card">
<h3>🎲 Random</h3>
<button onclick="randomNumber()">Créer</button>
<div id="random" class="result"></div>
</div>

<div class="card">
<h3>🔐 API Key</h3>
<button onclick="generateApi()">Créer</button>
<div id="api" class="result"></div>
</div>

<div class="card">
<h3>🎨 HEX Color</h3>
<button onclick="hexColor()">Créer</button>
<div id="hex" class="result"></div>
</div>

<div class="card">
<h3>🎮 Pseudo</h3>
<button onclick="pseudo()">Créer</button>
<div id="pseudo" class="result"></div>
</div>

<div class="card">
<h3>📜 Lorem</h3>
<button onclick="lorem()">Créer</button>
<div id="lorem" class="result"></div>
</div>

<div class="card">
<h3>🎲 Dé</h3>
<button onclick="dice()">Lancer</button>
<div id="dice" class="result"></div>
</div>

<div class="card">
<h3>🕒 Horloge</h3>
<div id="clock" class="result"></div>
</div>

<div class="card">
<h3>🔤 Base64</h3>
<input id="baseInput">
<button onclick="base64Encode()">Encoder</button>
<div id="baseOutput" class="result"></div>
</div>

<div class="card">
<h3>🔓 Decode</h3>
<input id="decodeInput">
<button onclick="base64Decode()">Décoder</button>
<div id="decodeOutput" class="result"></div>
</div>

<div class="card">
<h3>🌐 URL Encode</h3>
<input id="urlInput">
<button onclick="urlEncode()">Encoder</button>
<div id="urlOutput" class="result"></div>
</div>

<div class="card">
<h3>🔁 Reverse</h3>
<input id="reverseInput">
<button onclick="reverseText()">Go</button>
<div id="reverseOutput" class="result"></div>
</div>

<div class="card">
<h3>🔠 MAJ</h3>
<input id="upperInput">
<button onclick="upperText()">Go</button>
<div id="upperOutput" class="result"></div>
</div>

<div class="card">
<h3>🔡 Min</h3>
<input id="lowerInput">
<button onclick="lowerText()">Go</button>
<div id="lowerOutput" class="result"></div>
</div>

<div class="card">
<h3>📝 Mots</h3>
<input id="wordInput">
<button onclick="countWords()">Compter</button>
<div id="wordOutput" class="result"></div>
</div>

<div class="card">
<h3>🔢 Caractères</h3>
<input id="charInput">
<button onclick="countChars()">Compter</button>
<div id="charOutput" class="result"></div>
</div>

<div class="card">
<h3>🧮 Calcul</h3>
<input id="calcInput">
<button onclick="calc()">Calculer</button>
<div id="calcOutput" class="result"></div>
</div>

<div class="card">
<h3>🎨 RGB→HEX</h3>
<input id="r" placeholder="255,0,0">
<button onclick="rgbHex()">Convertir</button>
<div id="rgbhex" class="result"></div>
</div>

<div class="card">
<h3>⭐ Favori</h3>
<button onclick="alert('Bientôt')">Ouvrir</button>
</div>

</div>

<script>
function generatePassword(){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
let p="";
for(let i=0;i<16;i++)p+=chars[Math.floor(Math.random()*chars.length)];
password.innerText=p;
}

function generateUUID(){
uuid.innerText=crypto.randomUUID();
}

function randomNumber(){
random.innerText=Math.floor(Math.random()*1000000);
}

function generateApi(){
let s="";
const c="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
for(let i=0;i<32;i++)s+=c[Math.floor(Math.random()*c.length)];
api.innerText=s;
}

function hexColor(){
hex.innerText="#"+Math.floor(Math.random()*16777215).toString(16);
}

function pseudo(){
const list=["Corbeau","Ghost","Titan","Nova","Shadow","Pixel"];
pseudo.innerText=list[Math.floor(Math.random()*list.length)];
}

function lorem(){
lorem.innerText="Lorem ipsum dolor sit amet.";
}

function dice(){
dice.innerText=Math.floor(Math.random()*6)+1;
}

setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString();
},1000);

function base64Encode(){
baseOutput.innerText=btoa(baseInput.value);
}

function base64Decode(){
decodeOutput.innerText=atob(decodeInput.value);
}

function urlEncode(){
urlOutput.innerText=encodeURIComponent(urlInput.value);
}

function reverseText(){
reverseOutput.innerText=reverseInput.value.split("").reverse().join("");
}

function upperText(){
upperOutput.innerText=upperInput.value.toUpperCase();
}

function lowerText(){
lowerOutput.innerText=lowerInput.value.toLowerCase();
}

function countWords(){
wordOutput.innerText=wordInput.value.split(" ").length;
}

function countChars(){
charOutput.innerText=charInput.value.length;
}

function calc(){
try{
calcOutput.innerText=eval(calcInput.value);
}catch{
calcOutput.innerText="Erreur";
}
}

function rgbHex(){
let rgb=r.value.split(",");
let h="#"+((1<<24)+(+rgb[0]<<16)+(+rgb[1]<<8)+(+rgb[2])).toString(16).slice(1);
rgbhex.innerText=h;
}

function searchTools(){
let v=search.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none";
});
}
</script>

</body>
</html>
