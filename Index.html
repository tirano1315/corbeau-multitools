<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corbeau MultiTools V7</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.search{
width:100%;
padding:15px;
border:none;
border-radius:15px;
margin-bottom:20px;
background:#1e293b;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:20px;
box-shadow:0 0 15px rgba(139,92,246,.3);
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#8b5cf6;
color:white;
cursor:pointer;
}

.result{
margin-top:10px;
word-break:break-all;
}
</style>
</head>

<body>

<h1>🐦 Corbeau MultiTools V7</h1>

<input
class="search"
id="search"
placeholder="🔍 Rechercher un outil..."
onkeyup="searchTools()">

<div class="grid" id="tools">

<div class="card">
<h3>🔐 Générateur Mot de Passe</h3>
<button onclick="generatePassword()">Générer</button>
<div id="password" class="result"></div>
</div>

<div class="card">
<h3>🆔 Générateur UUID</h3>
<button onclick="generateUUID()">Générer</button>
<div id="uuid" class="result"></div>
</div>

<div class="card">
<h3>🔤 Encodeur Base64</h3>
<input id="baseInput" placeholder="Texte">
<button onclick="encodeBase64()">Encoder</button>
<div id="baseOutput" class="result"></div>
</div>

<div class="card">
<h3>🎲 Nombre Aléatoire</h3>
<button onclick="randomNumber()">Générer</button>
<div id="random" class="result"></div>
</div>

</div>

<script>

function generatePassword(){
const chars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

let pass = "";

for(let i=0;i<16;i++){
pass += chars.charAt(
Math.floor(Math.random()*chars.length)
);
}

document.getElementById("password").innerText = pass;
}

function generateUUID(){
document.getElementById("uuid").innerText =
crypto.randomUUID();
}

function encodeBase64(){
const text =
document.getElementById("baseInput").value;

document.getElementById("baseOutput").innerText =
btoa(text);
}

function randomNumber(){
document.getElementById("random").innerText =
Math.floor(Math.random()*1000000);
}

function searchTools(){
let input =
document.getElementById("search").value.toLowerCase();

let cards =
document.querySelectorAll(".card");

cards.forEach(card=>{
card.style.display =
card.innerText.toLowerCase().includes(input)
? "block"
: "none";
});
}

</script>

</body>
</html>
