
<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Corbeau-MultiTools V3</title>
<style>
body{margin:0;background:#090912;color:#fff;font-family:Arial}

</div>

function check(){let u=document.getElementById('u').value;document.getElementById('o').innerText=u?'Searching @'+u:'Enter username';}
function gen(){let a=['Corbeau.exe','RavenMX','Cuervo404','ShadowCrow'];document.getElementById('p').innerText=a[Math.floor(Math.random()*a.length)]}
</scrip
